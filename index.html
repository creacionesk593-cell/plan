<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBingo Pro - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: var(--card); padding: 35px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { text-align: center; margin-bottom: 25px; color: #fff; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; }
        .form-control { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 14px; }
        .form-control:focus { border-color: var(--blue); outline: none; }
        .btn { background: var(--blue); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; margin-top: 10px; }
        .btn:hover { background: #2563eb; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Consola TuBingo Pro</h2>
    <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
    </div>
    <div class="form-group">
        <label>Contraseña Acceso</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button class="btn" onclick="ejecutarLogin()">Iniciar Sesión</button>
    <div id="error" class="error-msg"></div>
</div>

<script src="configuracion.js"></script>
<script>
    // Si la sesión ya existe en las cookies/local, redirige de inmediato
    window.addEventListener('DOMContentLoaded', async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) enrutarPerfil(session.user.id);
    });

    async function ejecutarLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errDiv = document.getElementById('error');
        errDiv.style.display = "none";

        if(!email || !password) {
            errDiv.innerText = "Por favor, complete todos los campos.";
            errDiv.style.display = "block";
            return;
        }

        // 🛡️ Autenticación Nativa vía Supabase Auth (Cumple OWASP)
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            errDiv.innerText = "Credenciales de acceso incorrectas.";
            errDiv.style.display = "block";
            return;
        }

        enrutarPerfil(data.user.id);
    }

    async function enrutarPerfil(uid) {
        const { data: perfil } = await supabase.from('perfiles').select('rol, activo').eq('id', uid).single();
        if (!perfil || !perfil.activo) {
            alert("Cuenta inactiva.");
            await supabase.auth.signOut();
            location.reload();
            return;
        }

        if (perfil.rol === 'admin' || perfil.rol === 'vendedor') {
            window.location.href = "panel.html";
        } else {
            window.location.href = "app.html";
        }
    }
</script>
</body>
</html>
