<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBingo Pro - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: var(--card); padding: 35px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { text-align: center; margin-bottom: 25px; color: #fff; font-size: 24px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #94a3b8; }
        .form-control { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 14px; }
        .form-control:focus { border-color: var(--blue); outline: none; }
        .btn { background: var(--blue); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; margin-top: 10px; }
        .btn:hover { background: #2563eb; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 15px; text-align: center; display: none; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Consola TuBingo Pro</h2>
    <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
    </div>
    <div class="form-group">
        <label>Contraseña Acceso</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button class="btn" id="btn-login" onclick="ejecutarLogin()">Iniciar Sesión</button>
    <div id="error" class="error-msg"></div>
</div>

<script src="configuracion.js"></script>
<script>
    async function ejecutarLogin() {
        const emailInput = document.getElementById('email').value.trim();
        const passwordInput = document.getElementById('password').value.trim();
        const errDiv = document.getElementById('error');
        const btnLogin = document.getElementById('btn-login');
        
        // Limpiamos mensajes de error anteriores
        errDiv.style.display = "none";
        errDiv.innerText = "";

        if(!emailInput || !passwordInput) {
            errDiv.innerText = "Por favor, complete todos los campos.";
            errDiv.style.display = "block";
            return;
        }

        try {
            // Cambiamos el texto del botón para dar respuesta visual de carga
            btnLogin.innerText = "Verificando...";
            btnLogin.disabled = true;

            // 🔍 Buscamos en tu tabla personalizada perfiles
            const { data: listadoPerfiles, error } = await supabase
                .from('perfiles')
                .select('*')
                .eq('email', emailInput)
                .eq('password', passwordInput);

            if (error) {
                throw new Error("Fallo en Base de Datos: " + error.message);
            }

            // 🚨 Corrección Clave: Si la lista está vacía, los datos son incorrectos
            if (!listadoPerfiles || listadoPerfiles.length === 0) {
                errDiv.innerText = "Correo electrónico o contraseña incorrectos.";
                errDiv.style.display = "block";
                return;
            }

            // Extraemos el primer usuario encontrado de la lista de manera segura
            const usuarioValido = listadoPerfiles[0];

            // Validamos si lo tienes activo en tu tabla
            if (!usuarioValido.activo) {
                errDiv.innerText = "Esta cuenta ha sido desactivada por el administrador.";
                errDiv.style.display = "block";
                return;
            }

            // Guardamos la sesión localmente en formato JSON plano stringificado
            localStorage.setItem('usuario_bingo', JSON.stringify(usuarioValido));

            // Enrutamos según el rol de la tabla pública
            if (usuarioValido.rol === 'admin' || usuarioValido.rol === 'vendedor') {
                window.location.href = "panel.html";
            } else {
                window.location.href = "app.html";
            }

        } catch (err) {
            console.error("Detalles del error interno:", err);
            errDiv.innerText = "Error de comunicación: " + err.message;
            errDiv.style.display = "block";
        } finally {
            // El bloque 'finally' asegura que pase lo que pase, el botón se vuelva a activar
            btnLogin.innerText = "Iniciar Sesión";
            btnLogin.disabled = false;
        }
    }
</script>
</body>
</html>
