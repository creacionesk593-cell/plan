<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola Operativa - TuBingo Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: none; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .workspace { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .control-box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #334155; }
        .game-area { background: var(--card); padding: 25px; border-radius: 10px; border: 1px solid #334155; min-height: 400px; display: flex; justify-content: center; align-items: center; color: #64748b; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #94a3b8; }
        .form-control { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; }
        .btn { background: var(--blue); color: white; padding: 10px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div>
        <h2>Consola Operativa TuBingo Pro</h2>
        <p id="user-info" style="font-size: 13px; color: var(--blue);"></p>
    </div>
    <button onclick="cerrarSesion()" style="background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer;">Cerrar Sesión</button>
</header>

<div class="workspace">
    <aside class="control-box">
        <h3 style="margin-bottom: 15px; font-size: 16px;">📂 Mis JSONs Guardados</h3>
        <div class="form-group">
            <label>Seleccionar Configuración</label>
            <select id="select-json" class="form-control">
                <option value="">-- Elige una configuración --</option>
            </select>
        </div>
        <hr style="border-color: #334155; margin: 20px 0;">
        <h3 style="margin-bottom: 15px; font-size: 16px;">💾 Guardar Plantilla Actual</h3>
        <div class="form-group">
            <label>Nombre de la Plantilla</label>
            <input type="text" id="nombre-config" class="form-control" placeholder="Ej: Matriz Principal Wilian">
        </div>
        <button class="btn" onclick="guardarMiConfiguracion()">Guardar en la Nube</button>
    </aside>

    <main class="game-area" id="pantalla-juego">
        <p>[Módulo de juego activo]</p>
    </main>
</div>

<script src="configuracion.js"></script>
<script>
    let clienteLogueado = null;

    window.addEventListener('DOMContentLoaded', async () => {
        clienteLogueado = await verificarAccesoCliente();
        if(clienteLogueado) {
            document.body.style.display = "block";
            document.getElementById('user-info').innerText = `Cliente: ${clienteLogueado.nombre_completo}`;
            listarMisConfiguraciones();
        }
    });

    async function guardarMiConfiguracion() {
        const nombre = document.getElementById('nombre-config').value.trim();
        if (!nombre) { alert("Asigne un nombre."); return; }

        const objetoJsonEstructura = { version: "1.0", configs: [] }; 

        const { error } = await supabase.from('configuraciones_json').insert([
            { usuario_id: clienteLogueado.id, nombre_config: nombre, json_data: objetoJsonEstructura }
        ]);

        if (error) alert(error.message);
        else { alert("JSON guardado."); document.getElementById('nombre-config').value = ""; listarMisConfiguraciones(); }
    }

    async function listarMisConfiguraciones() {
        const { data: configs } = await supabase.from('configuraciones_json').select('id, nombre_config, json_data').eq('usuario_id', clienteLogueado.id);
        const select = document.getElementById('select-json');
        select.innerHTML = '<option value="">-- Elige una configuración --</option>';
        if(configs) {
            configs.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id; opt.textContent = c.nombre_config;
                select.appendChild(opt);
            });
        }
    }

    function cerrarSesion() { localStorage.removeItem('usuario_bingo'); window.location.href = "index.html"; }
</script>
</body>
</html>
