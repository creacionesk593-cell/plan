<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Sala de Control del Juego</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: none; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .workspace { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .control-box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #334155; height: fit-content; }
        .game-area { background: var(--card); padding: 25px; border-radius: 10px; border: 1px solid #334155; min-height: 400px; display: flex; justify-content: center; align-items: center; border-style: dashed; color: #64748b; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #94a3b8; }
        .form-control { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; }
        .btn { background: var(--blue); color: white; padding: 10px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>

<header>
    <div>
        <h2>Panel de Operación Bingo Pro</h2>
        <p id="user-info" style="font-size: 13px; color: var(--blue);"></p>
    </div>
    <button onclick="cerrarSesion()" style="background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer;">Cerrar Sesión</button>
</header>

<div class="workspace">
    <!-- PANEL DE CONTROL IZQUIERDO -->
    <aside class="control-box">
        <h3 style="margin-bottom: 15px; font-size: 16px;">📂 Cargar Configuraciones Guardadas</h3>
        <div class="form-group">
            <label>Tus Archivos Guardados</label>
            <select id="select-json" class="form-control">
                <option value="">-- Elige una configuración --</option>
            </select>
        </div>
        
        <hr style="border-color: #334155; margin: 20px 0;">
        
        <h3 style="margin-bottom: 15px; font-size: 16px;">💾 Guardar Configuración Actual</h3>
        <div class="form-group">
            <label>Nombre de la Configuración</label>
            <input type="text" id="nombre-config" class="form-control" placeholder="Ej: Bingo Fin de Semana">
        </div>
        <button class="btn" onclick="guardarMiConfiguracion()">Guardar en la Base de Datos</button>
    </aside>

    <!-- AREA DEL JUEGO DERECHA -->
    <main class="game-area" id="pantalla-juego">
        <div>
            <p style="text-align: center; font-size: 18px;">[Aquí se renderizará e integrará tu código de visualización del Bingo]</p>
        </div>
    </main>
</div>

<script src="configuracion.js"></script>
<script>
    let clienteLogueado = null;

    // 🔥 Validación estricta OWASP antes de pintar la pantalla
    window.addEventListener('DOMContentLoaded', async () => {
        clienteLogueado = await verificarAccesoCliente();
        if(clienteLogueado) {
            document.body.style.display = "block";
            document.getElementById('user-info').innerText = `Suscripción Activa de: ${clienteLogueado.nombre_completo}`;
            listarMisConfiguraciones();
        }
    });

    // --- GUARDAR JSON EN BASE DE DATOS ---
    async function guardarMiConfiguracion() {
        const nombre = document.getElementById('nombre-config').value;
        if (!nombre) { alert("Asigna un nombre a la configuración."); return; }

        // Aquí capturas el JSON real que procesa tu sistema de Bingo actual.
        // Simulamos un objeto de prueba para el ejemplo:
        const jsonDePruebaAExtraer = { configuracion_juego: "activa", velocidad: "multihilo", vectorizacion: 10 };

        const { error } = await supabase.from('configuraciones_json').insert([
            { usuario_id: clienteLogueado.id, nombre_config: nombre, json_data: jsonDePruebaAExtraer }
        ]);

        if (error) alert("Error al guardar: " + error.message);
        else { alert("¡Configuración guardada en la nube con éxito!"); document.getElementById('nombre-config').value = ""; listarMisConfiguraciones(); }
    }

    // --- LEER CONFIGURACIONES DE LA BASE DE DATOS ---
    async function listarMisConfiguraciones() {
        const { data: configs, error } = await supabase.from('configuraciones_json').select('id, nombre_config, json_data');
        if (error) return;

        const select = document.getElementById('select-json');
        select.innerHTML = '<option value="">-- Elige una configuración --</option>';

        configs.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.dataset.json = JSON.stringify(c.json_data);
            opt.textContent = c.nombre_config;
            select.appendChild(opt);
        });
    }

    // --- AL SELECCIONAR UN ELEMENTO SE CARGAN LOS DATOS EN EL SISTEMA ---
    document.getElementById('select-json').addEventListener('change', (e) => {
        const sel = e.target.options[e.target.selectedIndex];
        if (sel.value) {
            const datosDelBingoRecuperados = JSON.parse(sel.dataset.json);
            alert("¡Estructura cargada desde Supabase!\n" + JSON.stringify(datosDelBingoRecuperados));
            
            // 💡 AQUÍ ACOPLAS EL OBJETO 'datosDelBingoRecuperados' A TU LÓGICA DE JUEGO ACTUAL
        }
    });

    async function cerrarSesion() { await supabase.auth.signOut(); window.location.href = "index.html"; }
</script>
</body>
</html>
