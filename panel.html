<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --green: #10b981; --red: #ef4444; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: none; } /* Oculto hasta validar */
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #334155; margin-bottom: 30px; }
        .grid-layout { display: grid; grid-template-columns: 260px 1fr; gap: 25px; }
        nav { background: var(--card); padding: 20px; border-radius: 12px; height: fit-content; border: 1px solid #334155; }
        nav button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; color: var(--text); border: none; border-radius: 8px; text-align: left; cursor: pointer; font-size: 14px; }
        nav button.active, nav button:hover { background: var(--blue); color: white; }
        .content { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #94a3b8; }
        .form-control { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; }
        .btn { background: var(--blue); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-success { background: var(--green); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2 id="adm-titulo">Panel de Control Comercial</h2>
            <p id="user-badge" style="font-size: 13px; color: var(--blue); margin-top: 4px;"></p>
        </div>
        <button onclick="cerrarSesion()" style="background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;">Cerrar Sesión</button>
    </header>

    <div class="grid-layout">
        <nav>
            <button class="active" onclick="verTab('usuarios')">👥 Registro de Cuentas</button>
            <button id="nav-btn-planes" onclick="verTab('planes')">💰 Estructurar Planes</button>
            <button onclick="verTab('recargas')">⚡ Registrar Transacción</button>
        </nav>

        <main class="content">
            <!-- TAB: REGISTRO DE USUARIOS -->
            <div id="tab-usuarios" class="tab-item">
                <h3 style="margin-bottom: 15px;">Crear Credenciales de Acceso</h3>
                <form onsubmit="registrarUsuario(event)">
                    <div class="form-group"><label>Cédula / RUC</label><input type="text" id="u-cedula" class="form-control" required></div>
                    <div class="form-group"><label>Nombre Completo</label><input type="text" id="u-nombre" class="form-control" required></div>
                    <div class="form-group"><label>Email Corporativo o Cliente</label><input type="email" id="u-email" class="form-control" required></div>
                    <div class="form-group"><label>Contraseña Acceso</label><input type="password" id="u-pass" class="form-control" required></div>
                    <div class="form-group">
                        <label>Asignación de Rol</label>
                        <select id="u-rol" class="form-control">
                            <option value="cliente">Cliente (Operador del Juego)</option>
                            <option value="vendedor">Vendedor Autorizado</option>
                            <option value="admin">Administrador del Negocio</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Confirmar y Enviar a la Nube</button>
                </form>
            </div>

            <!-- TAB: CONFIGURACIÓN DE PLANES COMERCIALES -->
            <div id="tab-planes" class="tab-item" style="display:none;">
                <h3 style="margin-bottom: 15px;">Crear un Plan Fijo Comercial</h3>
                <form onsubmit="crearPlan(event)">
                    <div class="form-group"><label>Nombre Comercial del Plan</label><input type="text" id="p-nombre" class="form-control" placeholder="Ej: Plan Especial 10 Dólares" required></div>
                    <div class="form-group"><label>Precio del Plan ($)</label><input type="number" step="0.01" id="p-precio" class="form-control" required></div>
                    <div class="form-group"><label>Días Vigentes de Activación</label><input type="number" id="p-dias" class="form-control" required></div>
                    <button type="submit" class="btn btn-success">Publicar Plan Comercial</button>
                </form>
            </div>

            <!-- TAB: INYECCIÓN DE RECARGAS CON CONTROL DE ERRORES -->
            <div id="tab-recargas" class="tab-item" style="display:none;">
                <h3 style="margin-bottom: 15px;">Activar Suscripción Controlada</h3>
                <form onsubmit="procesarRecarga(event)">
                    <div class="form-group"><label>ID Único del Cliente (UUID)</label><input type="text" id="r-cliente-id" class="form-control" placeholder="Ingrese el código único del cliente" required></div>
                    <div class="form-group">
                        <label>Seleccionar Oferta Autorizada (Evita error de tipeo manual)</label>
                        <select id="r-plan-select" class="form-control" required>
                            <option value="">-- Cargando planes de Base de Datos --</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Ejecutar Transacción y Dar Acceso</button>
                </form>
            </div>
        </main>
    </div>
</div>

<script src="configuracion.js"></script>
<script>
    let adminLogueado = null;

    // 🔥 Validación de entrada estricta antes de pintar la pantalla
    window.addEventListener('DOMContentLoaded', async () => {
        adminLogueado = await verificarAccesoAdmin();
        if(adminLogueado) {
            document.body.style.display = "block"; // Se muestra la pantalla de manera segura
            document.getElementById('user-badge').innerText = `Operador: ${adminLogueado.nombre_completo} [${adminLogueado.rol.toUpperCase()}]`;
            
            if(adminLogueado.rol === 'vendedor') {
                document.getElementById('nav-btn-planes').style.display = 'none'; // Vendedor no edita precios
            }
            cargarPlanesEnSelect();
        }
    });

    async function registrarUsuario(e) {
        e.preventDefault();
        const email = document.getElementById('u-email').value;
        const password = document.getElementById('u-pass').value;
        const nombre = document.getElementById('u-nombre').value;
        const cedula = document.getElementById('u-cedula').value;
        const rol = document.getElementById('u-rol').value;

        const { data, error } = await supabase.auth.signUp({
            email, password, options: { data: { nombre: nombre } }
        });

        if (error) { alert("Error: " + error.message); return; }

        await supabase.from('perfiles').update({ cedula, nombre_completo: nombre, rol }).eq('id', data.user.id);
        alert(`Cuenta creada de forma segura.\nCódigo de Cuenta (UUID) del Cliente:\n${data.user.id}`);
        e.target.reset();
    }

    async function crearPlan(e) {
        e.preventDefault();
        if(adminLogueado.rol !== 'admin') { alert("Función de uso exclusivo para Administradores."); return; }
        
        const nombre_plan = document.getElementById('p-nombre').value;
        const precio = parseFloat(document.getElementById('p-precio').value);
        const duracion_dias = parseInt(document.getElementById('p-dias').value);

        const { error } = await supabase.from('planes').insert([{ nombre_plan, precio, duracion_dias, creado_por: adminLogueado.id }]);
        if (error) alert(error.message);
        else { alert("Plan guardado."); e.target.reset(); cargarPlanesEnSelect(); }
    }

    async function cargarPlanesEnSelect() {
        const { data: planes } = await supabase.from('planes').select('*');
        const select = document.getElementById('r-plan-select');
        select.innerHTML = '<option value="">-- Elige un Plan Autorizado --</option>';
        planes.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id; opt.dataset.dias = p.duracion_dias; opt.dataset.precio = p.precio;
            opt.textContent = `${p.nombre_plan} - $${p.precio} (${p.duracion_dias} días)`;
            select.appendChild(opt);
        });
    }

    async function procesarRecarga(e) {
        e.preventDefault();
        const cliente_id = document.getElementById('r-cliente-id').value;
        const sel = document.getElementById('r-plan-select').options[document.getElementById('r-plan-select').selectedIndex];
        
        if(!sel.value) return;
        const dias = parseInt(sel.dataset.dias);
        const precio = parseFloat(sel.dataset.precio);

        let f = new Date(); f.setDate(f.getDate() + dias);

        const { error } = await supabase.from('perfiles').update({ expiracion: f.toISOString(), activo: true }).eq('id', cliente_id);
        if (error) { alert("El ID introducido no corresponde a ningún cliente registrado."); return; }

        await supabase.from('historial_recargas').insert([{ vendedor_id: adminLogueado.id, cliente_id, plan_id: sel.value, monto_cobrado: precio }]);
        alert("¡Recarga inyectada con éxito sin errores manuales!");
        e.target.reset();
    }

    function verTab(tab) {
        document.querySelectorAll('.tab-item').forEach(el => el.style.display = 'none');
        document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    async function cerrarSesion() { await supabase.auth.signOut(); window.location.href = "index.html"; }
</script>
</body>
</html>
