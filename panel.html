<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - TuBingo Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --green: #10b981; --red: #ef4444; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: none; } /* Oculto hasta verificar RLS */
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #334155; margin-bottom: 30px; }
        .grid-layout { display: grid; grid-template-columns: 260px 1fr; gap: 25px; }
        nav { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; height: fit-content; }
        nav button { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; color: var(--text); border: none; border-radius: 8px; text-align: left; cursor: pointer; }
        nav button.active, nav button:hover { background: var(--blue); color: white; }
        .content { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #94a3b8; }
        .form-control { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; }
        .btn { background: var(--blue); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-success { background: var(--green); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2>Panel de Operaciones - TuBingo Pro</h2>
            <p id="user-badge" style="font-size: 13px; color: var(--blue); margin-top: 4px;"></p>
        </div>
        <button onclick="cerrarSesion()" style="background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;">Cerrar Sesión</button>
    </header>

    <div class="grid-layout">
        <nav>
            <button class="active" onclick="verTab('usuarios')">👥 Registrar Clientes</button>
            <button id="nav-btn-planes" onclick="verTab('planes')">💰 Estructurar Planes</button>
            <button onclick="verTab('recargas')">⚡ Registrar Transacción</button>
        </nav>

        <main class="content">
            <div id="tab-usuarios" class="tab-item">
                <h3 style="margin-bottom: 15px;">Crear Cuenta de Acceso</h3>
                <form onsubmit="crearUsuarioCompleto(event)">
                    <div class="form-group"><label>Correo Electrónico</label><input type="email" id="u-email" class="form-control" required></div>
                    <div class="form-group"><label>Contraseña de Acceso</label><input type="password" id="u-pass" class="form-control" required></div>
                    <div class="form-group"><label>Número de Cédula</label><input type="text" id="u-cedula" class="form-control" required></div>
                    <div class="form-group"><label>Nombre Completo</label><input type="text" id="u-nombre" class="form-control" required></div>
                    <div class="form-group"><label>Teléfono</label><input type="text" id="u-telefono" class="form-control"></div>
                    <div class="form-group">
                        <label>Rol de Usuario</label>
                        <select id="u-rol" class="form-control">
                            <option value="cliente">Cliente (Usuario App)</option>
                            <option value="vendedor">Vendedor Autorizado</option>
                            <option value="admin">Administrador Principal</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Guardar Usuario de Forma Segura</button>
                </form>
            </div>

            <div id="tab-planes" class="tab-item" style="display:none;">
                <h3 style="margin-bottom: 15px;">Configurar Plan Comercial</h3>
                <form onsubmit="crearPlan(event)">
                    <div class="form-group"><label>Nombre del Plan</label><input type="text" id="p-nombre" class="form-control" required></div>
                    <div class="form-group"><label>Precio de Venta ($)</label><input type="number" step="0.01" id="p-precio" class="form-control" required></div>
                    <div class="form-group"><label>Días Vigentes de Uso</label><input type="number" id="p-dias" class="form-control" required></div>
                    <button type="submit" class="btn btn-success">Publicar Plan</button>
                </form>
            </div>

            <div id="tab-recargas" class="tab-item" style="display:none;">
                <h3 style="margin-bottom: 15px;">Inyectar Tiempo de Suscripción</h3>
                <form onsubmit="procesarRecarga(event)">
                    <div class="form-group"><label>Número de Cédula del Cliente</label><input type="text" id="r-cedula" class="form-control" required></div>
                    <div class="form-group">
                        <label>Seleccionar Oferta Autorizada</label>
                        <select id="r-plan-select" class="form-control" required></select>
                    </div>
                    <button type="submit" class="btn btn-success">Procesar Recarga de Forma Segura</button>
                </form>
            </div>
        </main>
    </div>
</div>

<script src="configuracion.js"></script>
<script>
    let adminLogueado = null;

    window.addEventListener('DOMContentLoaded', async () => {
        adminLogueado = await verificarAccesoAdmin();
        if(adminLogueado) {
            document.body.style.display = "block";
            document.getElementById('user-badge').innerText = `Operador: ${adminLogueado.nombre_completo} [${adminLogueado.rol.toUpperCase()}]`;
            if(adminLogueado.rol === 'vendedor') {
                document.getElementById('nav-btn-planes').style.display = 'none';
            }
            cargarPlanesEnSelect();
        }
    });

    async function crearUsuarioCompleto(e) {
        e.preventDefault();
        const email = document.getElementById('u-email').value.trim();
        const password = document.getElementById('u-pass').value.trim();
        const cedula = document.getElementById('u-cedula').value.trim();
        const nombre = document.getElementById('u-nombre').value.trim();
        const telefono = document.getElementById('u-telefono').value.trim();
        const rol = document.getElementById('u-rol').value;

        // 🛡️ API OWASP: Registra al usuario en Auth y los metadatos viajan al Trigger de manera segura
        const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: {
                data: { cedula, nombre, telefono, rol }
            }
        });

        if (error) { alert("Error: " + error.message); } 
        else { alert("¡Usuario y Perfil creados con éxito mediante Trigger!"); e.target.reset(); }
    }

    async function crearPlan(e) {
        e.preventDefault();
        const nombre_plan = document.getElementById('p-nombre').value;
        const precio = parseFloat(document.getElementById('p-precio').value);
        const duracion_dias = parseInt(document.getElementById('p-dias').value);

        const { error } = await supabase.from('planes').insert([{ nombre_plan, precio, duracion_dias, creado_por: adminLogueado.id }]);
        if (error) alert(error.message);
        else { alert("Plan guardado."); e.target.reset(); cargarPlanesEnSelect(); }
    }

    async function cargarPlanesEnSelect() {
        const { data: planes } = await supabase.from('planes').select('*');
        const select = document.getElementById('r-plan-select');
        select.innerHTML = '<option value="">-- Selecciona un Plan --</option>';
        if(planes) {
            planes.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id; opt.dataset.dias = p.duracion_dias; opt.dataset.precio = p.precio;
                opt.textContent = `${p.nombre_plan} - $${p.precio} (${p.duracion_dias} días)`;
                select.appendChild(opt);
            });
        }
    }

    async function procesarRecarga(e) {
        e.preventDefault();
        const cedulaCliente = document.getElementById('r-cedula').value.trim();
        const sel = document.getElementById('r-plan-select').options[document.getElementById('r-plan-select').selectedIndex];
        if(!sel.value) return;

        const { data: cliente, error: errB } = await supabase.from('perfiles').select('id').eq('cedula', cedulaCliente).single();
        if (errB || !cliente) { alert("Cédula no encontrada."); return; }

        let exp = new Date(); exp.setDate(exp.getDate() + parseInt(sel.dataset.dias));

        const { error: errUp } = await supabase.from('perfiles').update({ expiracion: exp.toISOString(), activo: true }).eq('id', cliente.id);
        if (errUp) { alert(errUp.message); return; }

        await supabase.from('historial_recargas').insert([{ vendedor_id: adminLogueado.id, cliente_id: cliente.id, plan_id: sel.value, monto_cobrado: parseFloat(sel.dataset.precio) }]);
        alert("Recarga procesada exitosamente.");
        e.target.reset();
    }

    function verTab(tab) {
        document.querySelectorAll('.tab-item').forEach(el => el.style.display = 'none');
        document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    async function cerrarSesion() { await supabase.auth.signOut(); window.location.href = "index.html"; }
</script>
</body>
</html>
